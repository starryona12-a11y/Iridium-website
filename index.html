<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iridium - Element 77</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            border-top: 8px solid #ff4d6d;
        }
        img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        h1 { color: #ff4d6d; margin: 10px 0; }
        .badge {
            background: #ff4d6d;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Atomic Number 77</span>
        <h1>Iridium (Ir)</h1>
        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" alt="Iridium">
        <p>Iridium is a very rare, silvery-white transition metal. It is the most <strong>corrosion-resistant</strong> material in the world!</p>
    </div>
</body>
</html>
