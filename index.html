<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iridium - Element 77</title>
    <style>
        /* Colorful Gradient Background */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        /* Stylish Card Structure */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center;
            max-width: 400px;
            border: 5px solid #ff9a9e;
        }
        /* Image Style */
        img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #ff4b5c; margin: 10px 0; font-size: 2.5rem; }
        .atomic-num { background: #ff4b5c; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        p { color: #555; line-height: 1.6; }
        .fact { background: #fff0f0; padding: 10px; border-radius: 10px; font-style: italic; color: #d63031; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Iridium-pure.jpg/640px-Iridium-pure.jpg" alt="Iridium Crystal">
        
        <span class="atomic-num">Atomic Number 77</span>
        <h1>Iridium (Ir)</h1>
        <p>Iridium is a very rare, silvery-white transition metal. It is the most <strong>corrosion-resistant</strong> material in the world!</p>
        
        <div class="fact">
            "Named after Iris, the Greek goddess of the rainbow!"
        </div>
    </div>
</body>
</html>
